# 智科未来 — 与 Vino_test 同机部署时请保持本文件端口/容器名，勿与 Vino 冲突
# Vino_test: 前端 5201 / API 5202 / 门店 5203 / MySQL 主机 3308
# zhikeweilai: 前端 5301 / API 5302 / 门店 5303 / MySQL 主机 3310（3309 已被 jiuyoumi-mysql 占用）
name: zhikeweilai

services:
  zkwl-mysql:
    image: mysql:8.0
    container_name: zkwl-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: vino_secret_2024
      MYSQL_DATABASE: vino_db
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3310:3306"
    volumes:
      - zkwl-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zkwl-backend:
    build: ./backend
    container_name: zkwl-backend
    restart: always
    ports:
      - "5302:5302"
    environment:
      NODE_ENV: production
      PORT: 5302
      DB_HOST: zkwl-mysql
      DB_PORT: 3306
      DB_NAME: vino_db
      DB_USER: root
      DB_PASSWORD: vino_secret_2024
      JWT_SECRET: vino_jwt_production_secret_2024
      EMAIL_ENABLED: "true"
      EMAIL_HOST: smtp.qq.com
      EMAIL_PORT: "587"
      EMAIL_USERNAME: 654889339@qq.com
      EMAIL_PASSWORD: cmzltsrhmqfcbaia
      EMAIL_FROM: 654889339@qq.com
      EMAIL_FROM_NAME: Vino服务
      WECHAT_APPID: wxf6fdff25c117e86d
      WECHAT_SECRET: 8c82016b1f57a66764f581ae763dec15
      FRONTEND_URL: ${FRONTEND_URL:-http://106.54.50.88:5301}
      WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID:-}
      WECHAT_PAY_SERIAL_NO: ${WECHAT_PAY_SERIAL_NO:-}
      WECHAT_PAY_API_V3_KEY: ${WECHAT_PAY_API_V3_KEY:-}
      WECHAT_PAY_PRIVATE_KEY: ${WECHAT_PAY_PRIVATE_KEY:-}
      WECHAT_PAY_NOTIFY_URL: ${WECHAT_PAY_NOTIFY_URL:-}
      ALIPAY_APPID: ${ALIPAY_APPID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      # 对象存储密钥：放到服务器 .env（不要提交到仓库）
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
    depends_on:
      zkwl-mysql:
        condition: service_healthy

  zkwl-frontend:
    build: ./frontend
    container_name: zkwl-frontend
    restart: always
    ports:
      - "5301:5301"
    depends_on:
      - zkwl-backend

  zkwl-frontend-outlet:
    build: ./frontend_outlet
    container_name: zkwl-frontend-outlet
    restart: always
    ports:
      - "5303:5303"
    depends_on:
      - zkwl-backend

volumes:
  zkwl-mysql-data:
